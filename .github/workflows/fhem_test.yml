name: Fhem UnitTest
on:
  push:
    branches:
    paths:
      - 'FHEM/**'
      - 'lib/**'
      - 't/**'
      - '.github/workflows/fhem_test.yml'
  
  schedule:
    - cron: '43 17 * * 1'

jobs:
  update_controls:
    env:
      CONTROLS_FILENAME: controls_${{ github.event.repository.name }}.txt
    runs-on: ubuntu-latest
    steps:
    - name: Extract branch name
      run: echo "branch=$(echo ${GITHUB_REF#refs/*/})" >> $GITHUB_OUTPUT
      id: extract_branch
    - name: Checkout Repostory
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: update controls files
      uses: fhem/fhem-controls-actions@v2
      with:
        filename: ${{env.CONTROLS_FILENAME}} 
        directory: lib/Test2/FHEM
    - name: update controls files
      uses: fhem/fhem-controls-actions@v2
      with:
        filename: ${{env.CONTROLS_FILENAME}} 
        directory: lib/Test2/FHEM/SIGNALduino
        writemode: a
    - name: check controls changes
      id: controls_changed
      run: |
        git add "${CONTROLS_FILENAME}"
        if git diff --cached --quiet -- "${CONTROLS_FILENAME}"; then
          echo "changed=false" >> $GITHUB_OUTPUT
          git reset -- "${CONTROLS_FILENAME}"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi
    - name: update CHANGED
      if: steps.controls_changed.outputs.changed == 'true'
      run: |
        LOG=$(date +"%Y-%m-%d") 
        LOG+=" - $(git log -1 --pretty=%B)"
        echo "$LOG" | cat - CHANGED  2>/dev/null >> temp || true  && mv temp CHANGED
    - name: git commit back
      id: commit_back
      run: |
        git config --global user.email "action@github.com"
        git config --local user.name "GitHub Action"
        before_commit=$(git rev-parse HEAD)
        if [ "${{ steps.controls_changed.outputs.changed }}" != "true" ]; then
          echo "committed=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        git add CHANGED "${CONTROLS_FILENAME}"
        git diff --cached --quiet -- CHANGED "${CONTROLS_FILENAME}" || git commit -m "Automatic updated controls and CHANGED"
        after_commit=$(git rev-parse HEAD)
        if [ "$before_commit" != "$after_commit" ]; then
          echo "committed=true" >> $GITHUB_OUTPUT
        else
          echo "committed=false" >> $GITHUB_OUTPUT
        fi
    - name: git push
      if: steps.commit_back.outputs.committed == 'true'
      uses: ad-m/github-push-action@v1.1.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: ${{ steps.extract_branch.outputs.branch }}
